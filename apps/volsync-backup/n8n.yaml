---
# n8n バックアップ
apiVersion: volsync.backube/v1alpha1
kind: ReplicationSource
metadata:
  name: n8n-backup
  namespace: n8n
spec:
  sourcePVC: n8n-data
  trigger:
    schedule: "0 4 * * *"  # 毎日午前4時
  rclone:
    rcloneConfigSection: s3-backup
    rcloneDestPath: k3s/n8n
    copyMethod: Direct
    rcloneConfig: volsync-rclone-config
    moverSecurityContext:
      runAsUser: 1000
      fsGroup: 1000
