apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@youkan.uk
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
      - dns01:
          cloudflare:
            # The secret must exist in the "cert-manager" namespace and contain the API token
            # key name used below (matching the user's SealedSecret: "api_token").
            apiTokenSecretRef:
              name: cloudflare-api-token
              key: api_token
