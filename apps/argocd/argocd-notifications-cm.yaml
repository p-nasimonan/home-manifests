apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-notifications-cm
  namespace: argocd
data:
  context: |
    argocdUrl: https://argocd.youkan.uk

  # Discord webhook サービス定義
  # argocd-notifications-secret の discord-webhook-url キーを参照
  service.webhook.discord: |
    url: $discord-webhook-url
    headers:
    - name: Content-Type
      value: application/json

  # プレビュー環境デプロイ完了通知テンプレート
  template.preview-deployed: |
    webhook:
      discord:
        method: POST
        body: |
          {
            "embeds": [{
              "title": "🚀 Preview deployed: PR #{{index .app.metadata.labels "pr-number"}}",
              "url": "https://github.com/ubichill/ubichill/pull/{{index .app.metadata.labels "pr-number"}}",
              "description": "**URL:** https://pr-{{index .app.metadata.labels "pr-number"}}.app.ubichill.com\n**Status:** {{.app.status.health.status}}",
              "color": 5763719,
              "footer": {
                "text": "{{.app.metadata.name}}"
              }
            }]
          }

  # プレビュー: sync 成功 かつ Healthy になったときに通知
  trigger.on-preview-deployed: |
    - when: app.status.operationState.phase in ['Succeeded'] and app.status.health.status == 'Healthy'
      send: [preview-deployed]

  # prod デプロイ完了通知テンプレート
  template.prod-deployed: |
    webhook:
      discord:
        method: POST
        body: |
          {
            "embeds": [{
              "title": "✅ {{.app.metadata.name}} deployed",
              "description": "**Image:** `{{(index .app.status.summary.images 0)}}`",
              "color": 3447003,
              "footer": {
                "text": "{{.app.status.operationState.operation.sync.revision | substr 0 7}}"
              }
            }]
          }

  # prod: sync 成功時に通知
  trigger.on-prod-deployed: |
    - when: app.status.operationState.phase in ['Succeeded']
      send: [prod-deployed]

  # 失敗通知テンプレート（prod・preview 共通）
  template.sync-failed: |
    webhook:
      discord:
        method: POST
        body: |
          {
            "embeds": [{
              "title": "❌ Sync failed: {{.app.metadata.name}}",
              "description": "```{{.app.status.operationState.message}}```",
              "color": 15548997,
              "footer": {
                "text": "{{.app.status.operationState.operation.sync.revision | substr 0 7}}"
              }
            }]
          }

  # sync 失敗時に通知
  trigger.on-sync-failed: |
    - when: app.status.operationState.phase in ['Error', 'Failed']
      send: [sync-failed]
