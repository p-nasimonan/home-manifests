apiVersion: batch/v1
kind: Job
metadata:
  name: ubichill-dev-db-migrate
  namespace: ubichill-dev
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  backoffLimit: 5
  ttlSecondsAfterFinished: 120
  template:
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-postgres
          image: busybox
          command:
            - sh
            - -c
            - until nc -z ubichill-dev-postgresql 5432; do echo waiting for postgresql; sleep 3; done
      containers:
        - name: migrate
          image: ghcr.io/ubichill/ubichill-backend:dev
          imagePullPolicy: Always
          command: ["node", "node_modules/@ubichill/db/dist/migrate.js"]
          env:
            - name: PG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ubichill-dev-secrets
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: "postgresql://ubichill:$(PG_PASSWORD)@ubichill-dev-postgresql:5432/ubichill"
