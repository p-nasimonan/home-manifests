apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: churaverse

resources:
  - frontend-deployment.yaml
  - frontend-service.yaml
  - backend-deployment.yaml
  - backend-service.yaml
  - backend-livekit-deployment.yaml
  - backend-livekit-service.yaml
  - ingress.yaml
  - churaverse-secrets.enc.yaml

helmCharts:
  - name: livekit-server
    repo: https://helm.livekit.io
    version: 1.9.0
    releaseName: livekit
    namespace: churaverse
    valuesInline:
      livekit:
        port: 7880
        key_file: keys.yaml
        rtc:
          tcp_port: 7881
          port_range_start: 50000
          port_range_end: 60000
          use_external_ip: true
      # UDP WebRTC メディアをノードのネットワークに直接バインドする
      # Cloudflare Tunnel は UDP を通せないため hostNetwork 必須
      nodeSelector:
        kubernetes.io/hostname: k3s-worker-1
      deployment:
        hostNetwork: true
      storeKeysInSecret:
        enabled: true
        existingSecret: "churaverse-secrets"
