apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: churaverse

resources:
  - frontend-deployment.yaml
  - frontend-service.yaml
  - backend-deployment.yaml
  - backend-service.yaml
  - backend-livekit-deployment.yaml
  - backend-livekit-service.yaml
  - ingress.yaml
  - churaverse-secrets.enc.yaml

helmCharts:
  - name: livekit-server
    repo: https://helm.livekit.io
    version: 1.5.0
    releaseName: livekit
    namespace: churaverse
    valuesInline:
      livekit:
        port: 7880
        rtc:
          tcpPort: 7881
          portRangeStart: 50000
          portRangeEnd: 60000
          useExternalIP: true
        storeKeysInSecret:
          enabled: true
          existingSecret: "churaverse-secrets"
