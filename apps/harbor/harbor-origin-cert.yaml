apiVersion: v1
kind: Secret
metadata:
  name: harbor-origin-cert
  namespace: harbor
type: kubernetes.io/tls
data:
  # Replace these with base64-encoded certificate and key values
  # Example: base64 -w0 < origin_cert.pem
  tls.crt: INSERT_BASE64_CERT_HERE
  # Example: base64 -w0 < origin_key.pem
  tls.key: INSERT_BASE64_KEY_HERE
