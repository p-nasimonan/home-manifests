apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: minio-misskey
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  project: default
  sources:
    # SealedSecret (MinIO credentials)
    - repoURL: https://github.com/p-nasimonan/home-manifests.git
      targetRevision: main
      path: apps/minio-misskey
    # Helm chart
    - repoURL: https://charts.min.io/
      chart: minio
      targetRevision: 5.4.0
      helm:
        releaseName: minio-misskey
        valuesObject:
          # Secret には rootUser と rootPassword キーが必要
          existingSecret: minio-misskey-credentials

          mode: standalone

          persistence:
            enabled: true
            storageClass: nfs-client
            size: 50Gi

          service:
            type: ClusterIP
            port: 9000

          # コンソールは内部アクセスのみ
          consoleService:
            type: ClusterIP
            port: 9001

          resources:
            requests:
              memory: 256Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m

          # misskey用バケットを自動作成
          buckets:
            - name: misskey
              policy: none
              purge: false

  destination:
    server: https://kubernetes.default.svc
    namespace: misskey
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
