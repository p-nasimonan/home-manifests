apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: vrc-queue-monitor
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
    argocd-image-updater.argoproj.io/image-list: >-
      frontend=ghcr.io/p-nasimonan/vrc-queue-monitor/frontend,
      backend-api=ghcr.io/p-nasimonan/vrc-queue-monitor/backend,
      backend-collector=ghcr.io/p-nasimonan/vrc-queue-monitor/backend
    argocd-image-updater.argoproj.io/frontend.update-strategy: newest-build
    argocd-image-updater.argoproj.io/backend-api.update-strategy: newest-build
    argocd-image-updater.argoproj.io/backend-collector.update-strategy: newest-build
    argocd-image-updater.argoproj.io/frontend.allow-tags: regexp:^v[0-9]
    argocd-image-updater.argoproj.io/backend-api.allow-tags: regexp:^v[0-9]
    argocd-image-updater.argoproj.io/backend-collector.allow-tags: regexp:^v[0-9]
    argocd-image-updater.argoproj.io/write-back-method: argocd
    argocd-image-updater.argoproj.io/frontend.helm.image-name: frontend.image.name
    argocd-image-updater.argoproj.io/frontend.helm.image-tag: frontend.image.tag
    argocd-image-updater.argoproj.io/backend-api.helm.image-name: backendApi.image.name
    argocd-image-updater.argoproj.io/backend-api.helm.image-tag: backendApi.image.tag
    argocd-image-updater.argoproj.io/backend-collector.helm.image-name: backendCollector.image.name
    argocd-image-updater.argoproj.io/backend-collector.helm.image-tag: backendCollector.image.tag
spec:
  project: default
  sources:
    # SealedSecret の管理
    - repoURL: https://github.com/p-nasimonan/home-manifests.git
      targetRevision: main
      path: apps/vrc-queue-monitor
    # Helm Chart の管理
    - repoURL: https://github.com/p-nasimonan/vrc-queue-monitor.git
      targetRevision: main
      path: charts/vrc-queue-monitor
      helm:
        releaseName: vrc-queue-monitor
        valuesObject:
          ## ── イメージ設定 ─────────────────────────────────────
          image:
            registry: ghcr.io
            repository: p-nasimonan/vrc-queue-monitor
            pullPolicy: IfNotPresent
            tag: "latest"  # 空のときは Chart.yaml の appVersion を使用

          ## ── フロントエンド ────────────────────────────────────
          frontend:
            enabled: true
            replicaCount: 1
            image:
              name: frontend  # registry/repository/name:tag
              tag: ""
            resources:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                cpu: 500m
                memory: 512Mi
            service:
              type: ClusterIP
              port: 3000
            ## フロントエンドの環境変数（ConfigMap に書き出される）
            config:
              NEXT_PUBLIC_SITE_NAME: "VRC Queue Monitor"
              NEXT_PUBLIC_REFRESH_INTERVAL: "60000"
              NEXT_PUBLIC_DISPLAY_DAYS: "30"
              NEXT_PUBLIC_DEFAULT_THEME: "light"
              NEXT_PUBLIC_USE_MOCK_API: "false"
              ## BACKEND_API_URL はサーバーサイド変数。自動設定される（backendApi.service.name:port）
              ## 上書きしたい場合は以下をコメントアウト
              # BACKEND_API_URL: "https://api.example.com"

          ## ── バックエンド共通設定 ──────────────────────────────
          ## API・コレクター両方が参照する ConfigMap に書き出される。
          ## 使わない変数は各プロセスが無視する。
          backend:
            config:
              # API サーバー設定
              API_PORT: "8000"
              ENV: "production"
              ## CORS_ORIGINS: "https://vrc-monitor.example.com"
              # コレクター設定
              POLL_INTERVAL_MINUTES: "5"
              DISCOVERY_INTERVAL_MINUTES: "10"
              # スケジュール設定（両方で共有）
              SCHEDULE_TYPE: "always"   # always | weekday | day_of_month
              SCHEDULE_DAYS: ""         # 例: "sat,sun" または "5,15,25"
              SCHEDULE_START_TIME: "22:00"
              SCHEDULE_DURATION_MINUTES: "150"

          ## ── バックエンド API ──────────────────────────────────
          backendApi:
            enabled: true
            replicaCount: 1
            image:
              name: backend
              tag: ""
            command: ["python", "api.py"]
            resources:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                cpu: 500m
                memory: 256Mi
            service:
              type: ClusterIP
              port: 8000

          ## ── バックエンド コレクター ───────────────────────────
          backendCollector:
            enabled: true
            image:
              name: backend
              tag: ""
            command: ["python", "main.py"]
            resources:
              requests:
                cpu: 100m
                memory: 128Mi
              limits:
                cpu: 200m
                memory: 256Mi

          ## ── PostgreSQL ────────────────────────────────────────
          postgres:
            enabled: true
            image: postgres:15-alpine
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                cpu: 500m
                memory: 512Mi
            service:
              port: 5432
            persistence:
              enabled: true
              storageClass: "proxmox-data"
              size: 5Gi
            config:
              DB_NAME: vrc_monitor
              DB_USER: postgres

          ## ── シークレット（VRChat 認証情報・DB パスワード） ────
          ## 本番では SealedSecret または外部シークレット管理を推奨
          secrets:
            ## 既存の k8s Secret を使う場合は existingSecret に名前を設定
            ## SealedSecret 使用時は復号後の Secret 名を指定
            existingSecret: "vrc-queue-monitor-secrets"


          ingress:
            enabled: true
            className: cloudflare
            annotations: {}
            hosts:
              - host: vrc-monitor.youkan.uk
                paths:
                  - path: /
                    pathType: Prefix
                    service: frontend
            tls: []

  destination:
    server: https://kubernetes.default.svc
    namespace: vrc-queue-monitor

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - RespectIgnoreDifferences=true
      - CreateNamespace=true
      - PrunePropagationPolicy=background
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  revisionHistoryLimit: 5

  ignoreDifferences:
    - group: ""
      kind: PersistentVolumeClaim
      jsonPointers:
        - /spec/storageClassName
