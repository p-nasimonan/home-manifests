apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ubichill-dev-migrate
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://github.com/p-nasimonan/home-manifests.git
    targetRevision: main
    path: apps/ubichill-dev-migrate
  destination:
    server: https://kubernetes.default.svc
    namespace: ubichill-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
