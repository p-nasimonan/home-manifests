apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ubichill-helm-dev
  namespace: argocd
  annotations:
    argocd-image-updater.argoproj.io/image-list: >-
      backend=ghcr.io/ubichill/ubichill-backend,
      frontend=ghcr.io/ubichill/ubichill-frontend,
      video-player=ghcr.io/ubichill/video-player-backend

    argocd-image-updater.argoproj.io/backend.update-strategy: newest-build
    argocd-image-updater.argoproj.io/frontend.update-strategy: newest-build
    argocd-image-updater.argoproj.io/video-player.update-strategy: newest-build

    argocd-image-updater.argoproj.io/backend.allow-tags: regexp:^dev-[0-9a-f]+$
    argocd-image-updater.argoproj.io/frontend.allow-tags: regexp:^dev-[0-9a-f]+$
    argocd-image-updater.argoproj.io/video-player.allow-tags: regexp:^dev-[0-9a-f]+$

    argocd-image-updater.argoproj.io/write-back-method: argocd
    argocd-image-updater.argoproj.io/backend.helm.image-name: backend.image.repository
    argocd-image-updater.argoproj.io/backend.helm.image-tag: backend.image.tag
    argocd-image-updater.argoproj.io/frontend.helm.image-name: frontend.image.repository
    argocd-image-updater.argoproj.io/frontend.helm.image-tag: frontend.image.tag
    argocd-image-updater.argoproj.io/video-player.helm.image-name: pluginBackends[0].image.repository
    argocd-image-updater.argoproj.io/video-player.helm.image-tag: pluginBackends[0].image.tag
  labels:
    environment: development
    component: ubichill
spec:
  project: default
  source:
    repoURL: https://github.com/ubichill/ubichill
    targetRevision: dev
    path: charts/ubichill
    helm:
      valueFiles:
        - values.yaml
        - values-dev.yaml
      valuesObject:
        global:
          imageRegistry: "ghcr.io"
          domain: ubichill-dev.youkan.uk
        backend:
          existingSecret: "ubichill-helm-dev-secrets"
          image:
            repository: ghcr.io/ubichill/ubichill-backend
            tag: dev
        frontend:
          image:
            repository: ghcr.io/ubichill/ubichill-frontend
            tag: dev
        ingress:
          className: cloudflare
        redis:
          global:
            imageRegistry: ""
          image:
            registry: docker.io
            repository: bitnami/redis
            pullPolicy: IfNotPresent
          master:
            persistence:
              storageClass: local-path
        postgresql:
          global:
            imageRegistry: ""
          image:
            registry: docker.io
            repository: bitnami/postgresql
            pullPolicy: IfNotPresent
          primary:
            persistence:
              storageClass: local-path
        pluginBackends:
          - id: video-player
            image:
              repository: ghcr.io/ubichill/video-player-backend
              tag: dev
            port: 8000
            pathPrefix: /plugins/video-player/api
            env:
              ROOT_PATH: /plugins/video-player/api
              CORS_ORIGINS: "*"
            resources:
              limits:
                cpu: 500m
                memory: 512Mi
              requests:
                cpu: 100m
                memory: 128Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: ubichill-helm
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - RespectIgnoreDifferences=true
      - CreateNamespace=true
      - PrunePropagationPolicy=background
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  revisionHistoryLimit: 5
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/template/metadata/annotations/rollme
        - /spec/template/spec/containers/0/securityContext/allowPrivilegeEscalation
        - /spec/template/spec/containers/0/securityContext/capabilities
        - /spec/template/spec/containers/0/securityContext/readOnlyRootFilesystem
    - group: autoscaling
      kind: HorizontalPodAutoscaler
      jsonPointers:
        - /status
    - group: ""
      kind: PersistentVolumeClaim
      jsonPointers:
        - /spec/resources/requests/storage
  info:
    - name: 'Environment'
      value: 'Development'
